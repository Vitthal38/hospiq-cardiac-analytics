name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 pytest

      - name: Lint — flake8
        run: |
          flake8 pipeline/ analysis/ \
            --max-line-length=100 \
            --ignore=E501,W503

      - name: Data quality checks
        run: python pipeline/data_quality_checks.py

      - name: Unit tests
        run: pytest tests/ -v
